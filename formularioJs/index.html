<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index.css">
    <title>Document</title>
</head>
<body>
    <h1>Registro de personas</h1>
    <form>
        <div>
            <label for="txtNombre">Nombre:</label>
            <input type="text" id="txtNombre" required>
        </div>

        <div>
            <label for="txtCorreo">Correo:</label>
            <input type="email" id="txtCorreo" required>
        </div>
        <div>
            <label for="txtNacimiento">Fecha de nacimiento:</label>
            <input type="date" id="txtNacimiento" required>
        </div>

        <div>
            <label for="txtContrasenna">Contraseña:</label>
            <input type="password" id="txtContrasenna" required>
        </div>
        <div>
            <label for="txtConfirmacion">Confrimación de la contraseña:</label>
            <input type="password" id="txtConfirmacion" required>
        </div>

        <button type="button" id="btnRegistrar">Registrar</button>


    </form>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/index.js"></script>
</body>
</html>
